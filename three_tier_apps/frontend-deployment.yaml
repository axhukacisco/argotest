apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: frontend-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: three-tier
data:
  index.html: |
    <html>
      <body>
        <h1>3‑Tier App Running on Kind</h1>
        <button onclick="load()">Call Backend</button>
        <pre id="output"></pre>
        <script>
          function load() {
            fetch('/api')
              .then(r => r.text())
              .then(t => document.getElementById('output').innerText = t)
          }
        </script>
      </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: three-tier
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
